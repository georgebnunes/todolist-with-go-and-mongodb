services:
  mongodb:
    image: mongo:7
    container_name: mongodb_server
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: tododb
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: